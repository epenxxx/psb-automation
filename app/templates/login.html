<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Panel PSB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen">
    <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-96 border border-slate-800">
        <h1 class="text-2xl font-bold text-blue-500 text-center mb-1">ZYLVE PSB BOT</h1>
        <p class="text-slate-400 text-xs text-center mb-6">Management & Dual Gateway Panel</p>
        
        {% if error %}
        <div class="bg-red-500/10 border border-red-500 text-red-400 text-xs p-3 rounded mb-4 text-center">{{ error }}</div>
        {% endif %}
        {% if msg %}
        <div class="bg-emerald-500/10 border border-emerald-500 text-emerald-400 text-xs p-3 rounded mb-4 text-center">{{ msg }}</div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-slate-300 text-xs font-semibold mb-1">Username</label>
                <input type="text" name="username" required class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-slate-300 text-xs font-semibold mb-1">Password</label>
                <input type="password" name="password" required class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 rounded-lg text-sm transition">Masuk Dashboard</button>
        </form>
        <div class="mt-6 pt-4 border-t border-slate-800 text-center">
            <a href="/register" class="text-xs text-slate-400 hover:text-blue-400">+ Buat Admin Baru</a>
        </div>
    </div>
</body>
</html>
